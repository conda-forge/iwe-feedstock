context:
  version: "0.11.0"

package:
  name: iwe
  version: ${{ version }}

source:
  url: https://github.com/iwe-org/iwe/archive/refs/tags/iwe-v${{ version }}.tar.gz
  sha256: c1cfd54b16959e9e64a013cf71bb5d7de3511986bdbb228ed2a02878502ec776

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - if: unix
        then:
          - cargo auditable install --path=./crates/iwe  --root="$PREFIX" --no-track --locked --bins
          - cargo auditable install --path=./crates/iwec --root="$PREFIX" --no-track --locked --bins
          - cargo auditable install --path=./crates/iwes --root="$PREFIX" --no-track --locked --bins
          # generate shell completions
          - if: build_platform == host_platform
            then:
              - mkdir -p "$PREFIX"/share/bash-completion/completions "$PREFIX"/share/fish/vendor_completions.d "$PREFIX"/share/zsh/site-functions
              - '"$PREFIX"/bin/iwe completions bash > "$PREFIX"/share/bash-completion/completions/iwe'
              - '"$PREFIX"/bin/iwe completions fish > "$PREFIX"/share/fish/vendor_completions.d/iwe.fish'
              - '"$PREFIX"/bin/iwe completions zsh  > "$PREFIX"/share/zsh/site-functions/_iwe'
      - if: win
        then:
          - cargo auditable install --path=./crates/iwe  --root="%LIBRARY_PREFIX%" --no-track --locked --bins
          - cargo auditable install --path=./crates/iwec --root="%LIBRARY_PREFIX%" --no-track --locked --bins
          - cargo auditable install --path=./crates/iwes --root="%LIBRARY_PREFIX%" --no-track --locked --bins
          # generate shell completions
          - if: build_platform == host_platform
            then:
              - mkdir "%LIBRARY_PREFIX%"\share\bash-completion\completions
              - mkdir "%LIBRARY_PREFIX%"\share\fish\vendor_completions.d
              - mkdir "%LIBRARY_PREFIX%"\share\zsh\site-functions
              - '"%LIBRARY_BIN%"\iwe.exe completions bash > "%LIBRARY_PREFIX%"\share\bash-completion\completions\iwe'
              - '"%LIBRARY_BIN%"\iwe.exe completions fish > "%LIBRARY_PREFIX%"\share\fish\vendor_completions.d\iwe.fish'
              - '"%LIBRARY_BIN%"\iwe.exe completions zsh  > "%LIBRARY_PREFIX%"\share\zsh\site-functions\_iwe'
      - cargo-bundle-licenses --format=yaml --output=./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - iwe --help
      - iwe --version
  - package_contents:
      bin:
        - iwe
        - iwec
        - iwes
      files:
        - if: unix and build_platform == host_platform
          then:
            - share/bash-completion/completions/iwe
            - share/fish/vendor_completions.d/iwe.fish
            - share/zsh/site-functions/_iwe
        - if: win and build_platform == host_platform
          then:
            - Library/share/bash-completion/completions/iwe
            - Library/share/fish/vendor_completions.d/iwe.fish
            - Library/share/zsh/site-functions/_iwe
      strict: true

about:
  summary: IWE – Markdown memory system for you and your AI Agents
  description: |
    IWE is a knowledge graph system that serves as a "second brain" for humans
    and AI agents. It organizes notes hierarchically and makes them accessible
    through CLI tools and LSP for editor integration (VS Code, Neovim, Zed,
    Helix etc.).
  license: Apache-2.0
  license_file:
    - LICENSE-APACHE
    - THIRDPARTY.yml
  homepage: https://iwe.org
  documentation: https://iwe.md/docs/
  repository: https://github.com/iwe-org/iwe

extra:
  recipe-maintainers:
    - salim-b
